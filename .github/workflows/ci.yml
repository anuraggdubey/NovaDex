name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NEXT_PUBLIC_STELLAR_NETWORK: testnet
  NEXT_PUBLIC_HORIZON_URL: https://horizon-testnet.stellar.org
  NEXT_PUBLIC_AQUARIUS_API_URL: https://amm-api.aqua.network
  NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
  SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
  NEXT_PUBLIC_AGGREGATOR_CONTRACT_ID: CDUBGNAQCVTCPNRE3AUVFYPYE6UWFBVHPGX4BRBDGFNWBV7WERNC3Q7U
  NEXT_PUBLIC_ORACLE_CONTRACT_ID: CBPPZGP6ER3EGT5LIJNOWQE3QYRNFH5FRCT4ZHB2D6RPXV5SEV2H2RLK
  NEXT_PUBLIC_APP_URL: http://localhost:3000
  NEXT_PUBLIC_PROTOCOL_FEE_BPS: "10"

jobs:
  quality:
    name: Lint, typecheck, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
